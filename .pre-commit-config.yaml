# Optional bonus layer for contributors who use the pre-commit framework
# (https://pre-commit.com). The primary local gate is scripts/ci_local.sh,
# invoked by the .githooks/pre-push hook (see `make hooks`); this file does NOT
# replace it and needs no extra pip install for the pre-push path.
#
# To use this layer:
#   pip install pre-commit        # one time
#   pre-commit install            # wires .git/hooks/pre-commit
#
# Mirrors the ruff configuration in pyproject.toml ([tool.ruff]) so that what
# runs here matches the `ruff check` the CI lint gate enforces.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      # Lint with autofix (same rule set as pyproject [tool.ruff.lint]).
      - id: ruff
        args: [--fix]
      # Formatter (ruff-format), consistent line-length from pyproject.
      - id: ruff-format
