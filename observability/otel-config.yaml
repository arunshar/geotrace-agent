receivers:
  otlp:
    protocols:
      http: { endpoint: 0.0.0.0:4318 }
      grpc: { endpoint: 0.0.0.0:4317 }

processors:
  batch: { send_batch_size: 1024, timeout: 5s }
  tail_sampling:
    decision_wait: 10s
    num_traces: 50000
    expected_new_traces_per_sec: 10
    policies:
      - { name: errors_sample, type: status_code, status_code: { status_codes: [ERROR] } }
      - { name: slow_sample, type: latency, latency: { threshold_ms: 5000 } }
      - { name: probabilistic, type: probabilistic, probabilistic: { sampling_percentage: 1 } }

exporters:
  otlp/tempo: { endpoint: tempo:4317, tls: { insecure: true } }
  prometheus:  { endpoint: 0.0.0.0:8889 }

service:
  pipelines:
    traces:  { receivers: [otlp], processors: [batch, tail_sampling], exporters: [otlp/tempo] }
    metrics: { receivers: [otlp], processors: [batch],                exporters: [prometheus] }
