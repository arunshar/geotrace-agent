name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgeos-dev libproj-dev
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: ruff
        run: ruff check app observability evaluation tests spaces scripts
      - name: mypy
        run: mypy app || true
      - name: pytest
        run: pytest -q --cov=app --cov-report=term-missing
        env:
          GT_ANTHROPIC_API_KEY: ""
          GT_OPENAI_API_KEY: ""

  paper:
    runs-on: ubuntu-latest
    needs: lint-type-test
    steps:
      - uses: actions/checkout@v4
      - name: Install TeX Live (basic)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-recommended \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-pictures \
            texlive-science
      - name: Compile NeurIPS paper
        run: |
          cd paper
          make pdf
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v7
        with:
          name: geotrace_agent_neurips_pdf
          path: paper/geotrace_agent_neurips.pdf
